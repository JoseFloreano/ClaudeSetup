# ══════════════════════════════════════════════════════════════
#  Graphiti + FalkorDB — Setup multi-proyecto (Claude Code)
#
#  ESTRATEGIA A (la recomendada por la investigación, H2):
#    Datos vivos  → disco LOCAL (%LOCALAPPDATA%\graphiti\data | ~/.local/share/graphiti/data)
#    Backups .rdb → OneDrive/DevSetup/graphiti-data/backups/ (backup-graph cada 4h)
#  NUNCA apuntar FALKORDB_DATA_PATH a OneDrive (corrupción silenciosa).
#
#  Levanta:  docker compose --env-file <dir-local>/.env up -d
#  UI grafo: http://localhost:3000   MCP: http://localhost:8000/mcp/
# ══════════════════════════════════════════════════════════════

services:

  falkordb:
    # ── PIN DE VERSIÓN (auditoría A5, doc 03: nunca :latest entre laptops) ──
    # Al implementar: docker pull falkordb/falkordb:latest &&
    #   docker inspect --format '{{index .RepoDigests 0}}' falkordb/falkordb:latest
    # y fija FALKORDB_VERSION en el .env con el tag/digest concreto.
    # Actualiza el pin DELIBERADAMENTE y en TODAS las laptops a la vez.
    image: falkordb/falkordb:${FALKORDB_VERSION:?Fija FALKORDB_VERSION en .env (tag concreto, no latest)}
    container_name: graphiti-falkordb
    restart: unless-stopped
    ports:
      # 127.0.0.1 = solo esta máquina (auditoría R4: FalkorDB va sin password
      # y el MCP sin auth — jamás exponerlos a la LAN de un café/aeropuerto)
      - "127.0.0.1:6379:6379"   # protocolo Redis / FalkorDB
      - "127.0.0.1:3000:3000"   # FalkorDB Browser UI
    volumes:
      # ──────────────────────────────────────────────────────────
      # RUTA LOCAL OBLIGATORIA (fail-fast si no está definida).
      # Windows (formato Docker): /c/Users/TU/AppData/Local/graphiti/data
      # macOS / Linux:            ~/.local/share/graphiti/data
      # Si contiene "OneDrive" estás en la config prohibida por H2.
      # ──────────────────────────────────────────────────────────
      - ${FALKORDB_DATA_PATH:?Define FALKORDB_DATA_PATH en .env (ruta LOCAL, nunca OneDrive)}:/var/lib/falkordb/data
    environment:
      # AOF everysec = máx 1s de pérdida si crash; RDB para backups.
      # NOTA (auditoría A3): con AOF activo, el server carga del AOF al
      # arrancar e ignora dump.rdb — restaurar SIEMPRE con restore-graph.ps1/.sh.
      - REDIS_ARGS=--appendonly yes --appendfsync everysec --save 60 1000 --save 300 100 --save 900 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - graphiti-net

  graphiti-mcp:
    # PIN DE VERSIÓN: mismo criterio que arriba (el MCP está "experimental",
    # doc 03 — un pull accidental puede romper compatibilidad con el grafo).
    image: falkordb/graphiti-knowledge-graph-mcp:${GRAPHITI_MCP_VERSION:?Fija GRAPHITI_MCP_VERSION en .env}
    container_name: graphiti-mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"   # endpoint MCP — solo localhost
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      # ── LLM Provider ──────────────────────────────────────────
      # Graphiti usa LLM solo al ESCRIBIR (extracción de entidades).
      # Rutas: openai (pago, óptima) | gemini (GRATIS, recomendada sin costo)
      #        | groq (gratis, ojo con TPM) — ver .env.example.
      # Nunca anthropic con modelos chicos (H7: fallos silenciosos).
      # La key del provider elegido es obligatoria — lo valida setup-new-machine.
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-gpt-4.1-mini}
      - SMALL_MODEL_NAME=${SMALL_MODEL_NAME:-gpt-4.1-nano}
      # ── Database ─────────────────────────────────────────────
      - DATABASE_TYPE=falkordb
      - FALKORDB_HOST=falkordb      # nombre del servicio Docker
      - FALKORDB_PORT=6379
      - FALKORDB_PASSWORD=${FALKORDB_PASSWORD:-}
      # ── Concurrencia (rate limit protection) ─────────────────
      # OpenAI Tier 1 → 2 | Tier 2 → 8 | Tier 3+ → 15
      - SEMAPHORE_LIMIT=${SEMAPHORE_LIMIT:-3}
      # ── Telemetría (deshabilitada) ────────────────────────────
      - GRAPHITI_TELEMETRY_ENABLED=false
      - DISABLE_TELEMETRY=1
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      # ── Transport ─────────────────────────────────────────────
      - TRANSPORT=http
    volumes:
      - ${CONFIG_PATH:?Define CONFIG_PATH en .env (ruta LOCAL)}:/app/config:ro
    networks:
      - graphiti-net

networks:
  graphiti-net:
    driver: bridge

# ══════════════════════════════════════════════════════════════
#  NOTAS MULTI-LAPTOP (Estrategia A — ver auditoría doc 09)
# ══════════════════════════════════════════════════════════════
#
#  Datos vivos: disco local. OneDrive: SOLO snapshots terminados.
#
#  Al cambiar de laptop:
#    1. docker compose stop            (BGSAVE final)
#    2. backup-graph.ps1 / .sh         (snapshot → OneDrive/backups/)
#    3. Esperar sync de OneDrive
#    4. En la otra laptop: restore-graph.ps1 / .sh
#       (maneja el gotcha AOF: NUNCA copies dump.rdb a mano — con
#        appendonly activo el server lo ignora y "restaura" nada)
#
#  Los scripts de backup/restore avisan si el último backup lo escribió
#  OTRA máquina (protección contra fork del grafo, auditoría R1).
